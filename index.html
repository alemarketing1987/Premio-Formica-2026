<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Premio Formica 2026</title>

<style>
:root {
  --bg:#f5ead7;
  --card:#fffaf2;
  --gold:#c89b3c;
  --text:#1f1a14;
  --muted:#7a6d5f;
  --danger:#b3261e;
}

body{
  margin:0;
  padding:20px;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
}

.hero{text-align:center;margin-bottom:20px;}
.hero h1{margin:0;font-size:38px;}
.subtitle{margin-top:8px;color:var(--muted);font-style:italic;font-weight:600;}

.card{
  background:var(--card);
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h2{margin-top:0;}

select,button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  margin-top:10px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:#111;
  color:white;
  font-weight:700;
}

button.danger{
  background:var(--danger);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px 4px;
  border-bottom:1px solid #e5d7bf;
}

th:last-child,td:last-child{
  text-align:right;
  font-weight:700;
}

.podium{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.podium-box{
  flex:1;
  background:white;
  border-radius:18px;
  text-align:center;
  padding:12px;
}

.first{
  border:2px solid var(--gold);
}

.history-item{
  padding:10px 0;
  border-bottom:1px solid #eadbc7;
}
</style>
</head>

<body>

<div class="hero">
<h1>🏆 Premio Formica 2026</h1>
<div class="subtitle">“La ruota più oliata di Roveleto”</div>
</div>

<div class="card">
<h2>🥇 Podio</h2>
<div class="podium" id="podium"></div>
</div>

<div class="card">
<h2>➕ Assegna punti</h2>

<select id="player">
<option>Bozzo</option>
<option>Sive Sr</option>
<option>Sive Jr</option>
<option>Gale</option>
<option>NicolaIlMilan</option>
<option>Pacra</option>
<option>Pacra Jr</option>
<option>Pera</option>
<option>Pera Jr</option>
<option>Gallo</option>
<option>Rizzino</option>
<option>Patata</option>
</select>

<select id="event">
<option value="2">🍔 Pranzo fuori (+2)</option>
<option value="4">🍝 Cena fuori (+4)</option>
<option value="8">🍷 Cena ristorante top (+8)</option>
<option value="6">🍾 Bottiglia importante (+6)</option>
<option value="6">☀️ Pomeriggissimo (+6)</option>
<option value="8">⛰️ Pomeriggissimo Colle (+8)</option>
<option value="15">🇮🇹 Weekend Italia (+15)</option>
<option value="25">✈️ Weekend estero (+25)</option>
<option value="55">🏖️ Vacanza 7 giorni (+55)</option>
<option value="90">🌍 Vacanza 15 giorni (+90)</option>
<option value="25">🌴 Bonus vacanza mare posto esotico (+25)</option>
<option value="2">🍹 Aperitivo entro le 16 (+2)</option>
<option value="10">🚤 Barca/Yacht (+10)</option>
<option value="15">🛫 Più di 2 voli in un mese (+15)</option>
<option value="20">👑 Business class (+20)</option>
</select>

<button onclick="addPoints()">Assegna punti</button>
</div>

<div class="card">
<h2>🏆 Classifica LIVE</h2>
<table>
<thead>
<tr><th>#</th><th>Nome</th><th>Punti</th></tr>
</thead>
<tbody id="ranking"></tbody>
</table>
</div>

<div class="card">
<h2>🕘 Storico condiviso</h2>
<div id="history"></div>
<button class="danger" onclick="undoLastAction()">↩️ Annulla ultima azione</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-xnVN8-TXM4fTEWxXn5mJoW65m-rZfrI",
  authDomain: "premio-formica-2026.firebaseapp.com",
  projectId: "premio-formica-2026",
  storageBucket: "premio-formica-2026.firebasestorage.app",
  messagingSenderId: "58895076048",
  appId: "1:58895076048:web:8c85520cec6b243a48acd5",
  measurementId: "G-DNFNP480LD"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const initialPlayers = {
"Bozzo":0,
"Sive Sr":0,
"Sive Jr":0,
"Gale":0,
"NicolaIlMilan":0,
"Pacra":0,
"Pacra Jr":0,
"Pera":0,
"Pera Jr":0,
"Gallo":0,
"Rizzino":0,
"Patata":0
};

const ref = doc(db, "premioFormica", "classifica");

async function initDB(){
 const snap = await getDoc(ref);
 if(!snap.exists()){
   await setDoc(ref, {
      players: initialPlayers,
      history: []
   });
 }
}

function render(data){
 const players = data.players || {};
 const history = data.history || [];

 const sorted = Object.entries(players).sort((a,b)=>b[1]-a[1]);

 document.getElementById("podium").innerHTML = sorted.slice(0,3).map((p,i)=>`
 <div class="podium-box ${i===0?'first':''}">
 <div style="font-size:28px">${i===0?'🥇':i===1?'🥈':'🥉'}</div>
 <div style="font-weight:700">${p[0]}</div>
 <div>${p[1]} pt</div>
 </div>
 `).join("");

 document.getElementById("ranking").innerHTML = sorted.map((p,i)=>`
 <tr>
 <td>${i+1}</td>
 <td>${p[0]}</td>
 <td>${p[1]}</td>
 </tr>
 `).join("");

 document.getElementById("history").innerHTML = history.slice().reverse().map(h=>{
   if(typeof h === "string"){
     return `<div class="history-item">${h}</div>`;
   }
   return `<div class="history-item">${h.player}: ${h.label} (+${h.points})</div>`;
 }).join("");
}

window.addPoints = async function(){
 const player = document.getElementById("player").value;
 const event = document.getElementById("event");

 const points = parseInt(event.value);
 const label = event.options[event.selectedIndex].text;

 const snap = await getDoc(ref);
 const data = snap.data();

 if(!data.players) data.players = {...initialPlayers};
 if(!Array.isArray(data.history)) data.history = [];

 data.players[player] = (data.players[player] || 0) + points;

 data.history.push({
   player,
   points,
   label,
   createdAt: new Date().toLocaleString("it-IT")
 });

 await setDoc(ref, data);
}

window.undoLastAction = async function(){
 const ok = confirm("Vuoi annullare l'ultima azione inserita?");
 if(!ok) return;

 const snap = await getDoc(ref);
 const data = snap.data();

 if(!data || !Array.isArray(data.history) || data.history.length === 0){
   alert("Non ci sono azioni da annullare.");
   return;
 }

 const last = data.history.pop();

 if(typeof last === "string"){
   alert("Questa azione è stata salvata con la vecchia versione e non posso annullarla automaticamente.");
   await setDoc(ref, data);
   return;
 }

 data.players[last.player] = (data.players[last.player] || 0) - last.points;

 if(data.players[last.player] < 0){
   data.players[last.player] = 0;
 }

 await setDoc(ref, data);
}

initDB();

onSnapshot(ref, (docSnap)=>{
 if(docSnap.exists()){
   render(docSnap.data());
 }
});
</script>

</body>
</html>
